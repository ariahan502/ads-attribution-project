base_config: configs/ctr_baseline_v2_features.yaml
output_dir: artifacts/runs
run_name: ctr_compare_baseline_v2_features
models:
  - name: logistic_regression
    run_name: ctr_baseline_v2_logistic
    model_type: logistic_regression
    model_params:
      max_iter: 100
  - name: xgboost_hist
    run_name: ctr_baseline_v2_xgboost
    model_type: xgboost
    model_params:
      n_estimators: 120
      max_depth: 5
      learning_rate: 0.08
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 1
      reg_lambda: 1.0
      random_state: 42
      n_jobs: 1
