dataset_path: data/samples/sample_1m.parquet
timestamp_col: timestamp
feature_builder: semisynthetic_rank_v1
synthetic_treatment_col: synthetic_treatment
synthetic_outcome_col: synthetic_outcome
true_effect_col: true_treatment_effect
synthetic_seed: 42
policy_random_seed: 42
score_cols:
  - observational_score
  - doubly_robust_score
top_fractions:
  - 0.01
  - 0.05
  - 0.1
  - 0.2
  - 0.3
numeric_features:
  - log_cost
  - log_cpo
  - time_since_last_click
  - has_prev_click
  - log_time_since_last_click
  - cost_rank
  - cpo_rank
  - recency_rank
categorical_features:
  - cat1
  - cat2
  - cat3
  - cat4
  - cat5
  - cat6
  - cat7
  - cat8
  - cat9
  - campaign
  - recency_bucket
train_fraction: 0.7
validation_fraction: 0.1
propensity_clip: 0.05
learner_type: xgboost
learner_params:
  n_estimators: 80
  max_depth: 3
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  n_jobs: 1
output_dir: artifacts/runs
run_name: policy_semisynthetic_xgboost_baseline
